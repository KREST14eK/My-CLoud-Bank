<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>G-COIN — Ball system</title>

    <!-- PWA / iOS Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="G-COIN">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

    <!-- Firebase & Fonts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text: #f1f5f9;
            --accent: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 950px;
            position: relative;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 12px; top: 12px; color: #94a3b8; font-size: 14px; }
        
        input, textarea {
            width: 100%;
            padding: 10px 10px 10px 35px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 8px;
        }
        button:hover { filter: brightness(1.2); }

        .panel-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 15px;
        }
        .panel-title {
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .balance-card {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 15px;
        }
        .balance-amount { font-size: 32px; font-weight: 800; }

        .history-box {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 12px;
        }
        .trans-item {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        /* Кнопка запроса (FAB) */
        .fab-request {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.5);
            cursor: pointer;
            z-index: 1000;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fab-request:active { transform: scale(0.9); }

        /* Шторка для написания запроса */
        .side-drawer {
            position: fixed;
            top: 0; right: -350px; width: 300px; height: 100%;
            background: #1e293b; border-left: 1px solid rgba(255,255,255,0.1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 1001;
            transition: 0.4s ease; padding: 30px; display: flex; flex-direction: column;
        }
        .side-drawer.open { right: 0; }
        .drawer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 1000; backdrop-filter: blur(4px);
        }

        /* Модалка истории */
        .modal-full {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            display: none;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-full.active { display: flex; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(99, 102, 241, 0.2); color: var(--primary); font-size: 12px; }

        .admin-req-item {
            background: #2b303b;
            border-radius: 12px;
            padding: 12px;
            border-left: 4px solid var(--primary);
            position: relative;
            margin-bottom: 10px;
        }

        .btn-del-small {
            position: absolute; top: 6px; right: 6px; width: 35px; height: 18px;
            background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 4px; font-size: 8px; font-weight: 800; cursor: pointer;
        }

        /* ИНТЕГРИРОВАННЫЕ CSS КОМПОНЕНТЫ ЗАДАНИЙ И ЧАТА */
        .task-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .task-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
        }
        .task-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .task-badge.pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .task-badge.completed { background: rgba(34, 197, 94, 0.2); color: #22c55e; }

        .task-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            z-index: 3000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            display: none;
        }
        .chat-msg {
            padding: 6px 10px;
            border-radius: 10px;
            max-width: 80%;
            font-size: 13px;
            line-height: 1.4;
        }
        .chat-msg.admin-style { background: rgba(99, 102, 241, 0.2); align-self: flex-start; }
        .chat-msg.user-style { background: rgba(255, 255, 255, 0.08); align-self: flex-end; }
    </style>
</head>
<body>

<div id="drawer-overlay" class="drawer-overlay" onclick="toggleDrawer()"></div>
<div id="side-drawer" class="side-drawer">
    <h3 style="margin: 0 0 10px 0; color: var(--primary);">Новый запрос</h3>
    <textarea id="request-text" style="height: 150px; padding: 12px; margin-bottom: 15px;" placeholder="Опиши свою просьбу или вопрос..."></textarea>
    <button onclick="sendRequestToServer()">Отправить запрос</button>
    <button onclick="toggleDrawer()" style="background: transparent; border: 1px solid #475569;">Отмена</button>
</div>

<div id="fab-btn" class="fab-request" onclick="toggleDrawer()">
    <i class="fas fa-comment-dots"></i>
</div>

<div id="admin-modal" class="modal-full">
    <div style="display: flex; align-items: center; margin-bottom: 20px;">
        <button onclick="closeAdminModal()" style="width: auto; background: #334155; margin-right: 20px;">✕ Закрыть</button>
        <h2 id="modal-title" style="margin:0; color: var(--primary);">История</h2>
    </div>
    <div style="overflow-y: auto;">
        <table>
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Сообщение</th>
                    <th>Штраф</th>
                    <th>Пополнение</th>
                </tr>
            </thead>
            <tbody id="modal-table-body"></tbody>
        </table>
    </div>
</div>

<!-- ИНТЕГРИРОВАННЫЕ ОКНА: СОЗДАНИЕ И ЧАТ ЗАДАНИЙ -->
<div id="modal-task-create" class="task-modal">
    <h3 style="margin-top:0; color:var(--primary);">Новое задание</h3>
    <div class="input-group"><i class="fas fa-heading"></i><input type="text" id="nt-title" placeholder="Название"></div>
    <div class="input-group"><i class="fas fa-align-left"></i><textarea id="nt-desc" placeholder="Описание" style="height:80px; padding-left:35px;"></textarea></div>
    <div class="input-group"><i class="fas fa-coins"></i><input type="number" id="nt-points" placeholder="Баллы"></div>
    <div class="input-group"><i class="fas fa-user"></i>
        <select id="nt-assignee" style="width:100%; padding:10px 10px 10px 35px; background:rgba(15,23,42,0.7); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:white;">
            <option value="svyat">svyat</option>
            <option value="misha">misha</option>
            <option value="all">Все (all)</option>
        </select>
    </div>
    <button style="background:var(--success)" onclick="createTask()">Создать задание</button>
    <button style="background:transparent; border:1px solid #475569;" onclick="document.getElementById('modal-task-create').style.display='none'">Отмена</button>
</div>

<div id="modal-task-view" class="task-modal" style="max-width: 500px;">
    <h3 id="vt-title" style="margin-top:0; color:var(--primary); margin-bottom:5px;"></h3>
    <div style="font-size:12px; opacity:0.6; margin-bottom:10px;" id="vt-meta"></div>
    <p id="vt-desc" style="background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; font-size:13px; margin-bottom:15px;"></p>
    
    <div class="panel-title" style="margin-bottom:5px; font-size:11px;"><i class="fas fa-comments"></i> ОБСУЖДЕНИЕ</div>
    <div id="vt-chat-box" style="height:180px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:10px; padding:10px; display:flex; flex-direction:column; gap:8px; margin-bottom:10px;"></div>
    
    <div class="input-group" style="margin-bottom:15px;">
        <input type="text" id="vt-chat-input" placeholder="Напишите сообщение..." style="padding-right:60px;">
        <button onclick="sendMessage()" style="position:absolute; right:5px; top:5px; width:auto; padding:5px 12px; font-size:12px; margin:0;">Отправить</button>
    </div>
    
    <div id="vt-actions" style="display:grid; grid-template-columns:1fr; gap:10px;"></div>
    <button style="background:#475569; margin-top:10px;" onclick="closeTaskModal()">Закрыть</button>
</div>

<div class="container">
    <div id="login-screen" class="screen active">
        <div style="max-width: 320px; margin: 0 auto; text-align: center;">
            <i class="fas fa-shield-halved" style="font-size: 60px; color: var(--primary); margin-bottom: 20px;"></i>
            <h2 style="margin: 0 0 25px 0;">G-COIN</h2>
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="login-input" placeholder="Логин"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="pass-input" placeholder="Пароль"></div>
            <button onclick="auth()">Войти в систему</button>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div style="font-weight: bold; font-size: 18px;">
                <i class="fas fa-user-circle"></i> <span id="user-name"></span>
            </div>
            <button onclick="logout()" style="width: auto; padding: 8px 15px; background: #334155; margin:0;">
                <i class="fas fa-sign-out-alt"></i> Выход
            </button>
        </div>

        <div class="dashboard">
            <div id="left-column"></div>
            <div id="right-column"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBExRrPLJEI-oWgOEcZ2WLn04EGLduGJSc",
        authDomain: "mycloudlybank.firebaseapp.com",
        databaseURL: "https://mycloudlybank-default-rtdb.firebaseio.com",
        projectId: "mycloudlybank",
        storageBucket: "mycloudlybank.firebasestorage.app",
        messagingSenderId: "482067969296",
        appId: "1:482067969296:web:0bcb8305693cac9dfc2195"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentLogin = null;
    const admins = ['maxS', 'maxA'];
    const days = ['ВС', 'ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'];
    let activeTaskId = null;

    // Регистрация Service Worker для PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('SW registered: ', reg);
            }).catch(err => {
                console.error('SW registration failed: ', err);
            });
        });
    }

    window.onload = function() {
        const sl = localStorage.getItem('gcoin_login'), sp = localStorage.getItem('gcoin_pass');
        if (sl && sp) {
            document.getElementById('login-input').value = sl;
            document.getElementById('pass-input').value = sp;
            auth(true);
        }
    };

    function auth(isAuto = false) {
        const login = document.getElementById('login-input').value.trim();
        const pass = document.getElementById('pass-input').value;
        if (!login || !pass) return;
        db.ref('users/' + login).once('value', (snap) => {
            if (snap.exists() && snap.val().password === pass) {
                localStorage.setItem('gcoin_login', login);
                localStorage.setItem('gcoin_pass', pass);
                renderUI(login);
            } else if (!snap.exists()) {
                db.ref('users/' + login).set({ password: pass, balance: 0 }).then(() => renderUI(login));
            } else if (!isAuto) alert("Ошибка доступа");
        });
    }

    function logout() { localStorage.clear(); location.reload(); }

    function renderUI(login) {
        currentLogin = login;
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
        document.getElementById('user-name').innerText = login;
        const leftCol = document.getElementById('left-column');
        const rightCol = document.getElementById('right-column');
        leftCol.innerHTML = ''; rightCol.innerHTML = '';

        const isAdmin = admins.includes(login);

        if (isAdmin) {
            // АДМИН (ЛЕВАЯ ЧАСТЬ)
            document.getElementById('fab-btn').style.display = 'none';
            ['svyat', 'misha'].forEach(user => {
                const section = document.createElement('div');
                section.className = 'panel-section';
                section.innerHTML = `
                    <div class="panel-title" style="justify-content:space-between">
                        <span><i class="fas fa-user-gear"></i> ${user.toUpperCase()}</span>
                        <span id="bal-${user}" style="color:var(--primary)">0 Б</span>
                    </div>
                    <div class="input-group"><i class="fas fa-comment"></i><input type="text" id="msg-${user}" placeholder="Сообщение"></div>
                    <div class="input-group"><i class="fas fa-coins"></i><input type="number" id="amt-${user}" placeholder="Сумма"></div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <button style="background:var(--success)" onclick="adminAction('${user}', 'plus')">Пополнить</button>
                        <button style="background:var(--accent)" onclick="adminAction('${user}', 'minus')">Штраф</button>
                    </div>
                    <button style="background:#475569; margin-top:5px" onclick="openAdminModal('${user}')">Таблица истории</button>
                `;
                leftCol.appendChild(section);
                db.ref(`users/${user}/balance`).on('value', s => {
                    document.getElementById(`bal-${user}`).innerText = (s.val() || 0) + ' Б';
                });
            });

            // ПРАВАЯ ЧАСТЬ (ВАРИАНТ 1: Сверху Requests меньше, Снизу Tasks)
            rightCol.innerHTML = `
                <div class="panel-section" style="display:flex; flex-direction:column; max-height:260px; margin-bottom:20px;">
                    <div class="panel-title"><i class="fas fa-envelope-open-text"></i> Запросы</div>
                    <div id="admin-requests-container" style="overflow-y:auto; flex:1;"></div>
                </div>
                <div class="panel-section" style="display:flex; flex-direction:column; min-height:280px;">
                    <div class="panel-title" style="justify-content:space-between; align-items:center;">
                        <span><i class="fas fa-tasks"></i> Задания / Tasks</span>
                        <button style="width:auto; margin:0; padding:6px 12px; font-size:12px; background:var(--success)" onclick="document.getElementById('modal-task-create').style.display='block'">+ Создать</button>
                    </div>
                    <div id="tasks-container" style="overflow-y:auto; flex:1;"></div>
                </div>
            `;
            initAdminRequests();
            loadTasks(true);

        } else {
            // ПОЛЬЗОВАТЕЛЬ (ЛЕВАЯ ЧАСТЬ)
            document.getElementById('fab-btn').style.display = 'flex';
            leftCol.innerHTML = `<div class="balance-card"><div style="font-size:11px; opacity:0.8;">МОЙ СЧЕТ</div><div class="balance-amount" id="balance-val">0 Б</div></div>
                <div class="history-box" id="history-box"><div class="panel-title">ОПЕРАЦИИ</div></div>`;
            
            // ПРАВАЯ ЧАСТЬ (ВАРИАНТ 1: Сверху Перевод, Снизу Tasks)
            rightCol.innerHTML = `
                <div class="panel-section" style="margin-bottom:20px;">
                    <div class="panel-title">ПЕРЕВОД</div>
                    <div class="input-group"><i class="fas fa-at"></i><input type="text" id="target-user" placeholder="Кому"></div>
                    <div class="input-group"><i class="fas fa-coins"></i><input type="number" id="amount-input" placeholder="Сумма"></div>
                    <button style="background:var(--success)" onclick="sendMoney()">Отправить</button>
                </div>
                <div class="panel-section" style="display:flex; flex-direction:column; min-height:250px;">
                    <div class="panel-title"><i class="fas fa-tasks"></i> Мои Задания</div>
                    <div id="tasks-container" style="overflow-y:auto; flex:1;"></div>
                </div>
            `;
            db.ref(`users/${login}/balance`).on('value', s => document.getElementById('balance-val').innerText = (s.val() || 0) + ' Б');
            initUserHistory(login);
            loadTasks(false);
        }
    }

    // Управление шторкой
    function toggleDrawer() {
        const dr = document.getElementById('side-drawer');
        const ov = document.getElementById('drawer-overlay');
        dr.classList.toggle('open');
        ov.style.display = dr.classList.contains('open') ? 'block' : 'none';
    }

    function sendRequestToServer() {
        const txt = document.getElementById('request-text').value.trim();
        if (!txt) return alert("Напиши сообщение!");
        db.ref('requests').push({
            from: currentLogin,
            text: txt,
            timestamp: Date.now()
        });
        alert("Запрос отправлен!");
        document.getElementById('request-text').value = '';
        toggleDrawer();
    }

    function adminAction(user, type) {
        const amt = parseInt(document.getElementById(`amt-${user}`).value);
        const msg = document.getElementById(`msg-${user}`).value.trim();
        if (!amt || !msg) return alert("Заполни данные!");
        const change = type === 'plus' ? amt : -amt;
        db.ref(`users/${user}/balance`).transaction(c => (c || 0) + change);
        db.ref('history').push({ from: type==='plus'?'Центробанк':user, to: type==='plus'?user:'Штраф', amount: amt, reason: msg, timestamp: Date.now() });
        document.getElementById(`amt-${user}`).value = ''; document.getElementById(`msg-${user}`).value = '';
    }

    function openAdminModal(user) {
        document.getElementById('modal-title').innerText = "История: " + user.toUpperCase();
        document.getElementById('admin-modal').classList.add('active');
        db.ref('history').on('value', snap => {
            const tbody = document.getElementById('modal-table-body');
            tbody.innerHTML = '';
            const list = [];
            snap.forEach(c => { if(c.val().from === user || c.val().to === user) list.push(c.val()); });
            list.reverse().forEach(d => {
                const isPlus = d.to === user;
                const dt = new Date(d.timestamp);
                tbody.innerHTML += `<tr>
                    <td style="font-size:10px">${dt.toLocaleDateString()} (${days[dt.getDay()]})</td>
                    <td>${d.reason}</td>
                    <td style="color:var(--accent)">${!isPlus ? d.amount : ''}</td>
                    <td style="color:var(--success)">${isPlus ? d.amount : ''}</td>
                </tr>`;
            });
        });
    }

    function closeAdminModal() { document.getElementById('admin-modal').classList.remove('active'); db.ref('history').off(); }

    function initAdminRequests() {
        db.ref('requests').on('value', snap => {
            const container = document.getElementById('admin-requests-container');
            if (!container) return;
            container.innerHTML = '';
            Object.entries(snap.val() || {}).reverse().forEach(([id, r]) => {
                container.innerHTML += `<div class="admin-req-item">
                    <div style="font-size:10px; color:var(--primary)">ОТ: ${r.from}</div>
                    <div style="font-size:13px">${r.text}</div>
                    <button class="btn-del-small" onclick="db.ref('requests/${id}').remove()">DEL</button></div>`;
            });
        });
    }

    function sendMoney() {
        const target = document.getElementById('target-user').value.trim(), amt = parseInt(document.getElementById('amount-input').value);
        if (!target || !amt || amt <= 0) return;
        db.ref(`users/${target}`).once('value', s => {
            if (!s.exists()) return alert("Нет такого юзера");
            db.ref(`users/${currentLogin}/balance`).once('value', ms => {
                if (ms.val() < amt) return alert("Мало баллов");
                db.ref(`users/${currentLogin}/balance`).set(ms.val() - amt);
                db.ref(`users/${target}/balance`).transaction(b => (b || 0) + amt);
                db.ref('history').push({ from: currentLogin, to: target, amount: amt, timestamp: Date.now(), reason: 'Перевод' });
                alert("Переведено!");
            });
        });
    }

    function initUserHistory(login) {
        db.ref('history').on('value', snap => {
            const box = document.getElementById('history-box');
            if (!box) return;
            box.innerHTML = '<div class="panel-title">ОПЕРАЦИИ</div>';
            const list = [];
            snap.forEach(c => { if(c.val().from === login || c.val().to === login) list.push(c.val()); });
            list.reverse().slice(0,10).forEach(d => {
                const isOut = d.from === login;
                box.innerHTML += `<div class="trans-item">
                    <span style="color:${isOut?'#f87171':'#4ade80'}">${isOut?'-':'+'} ${d.amount} Б</span>
                    <div style="font-size:11px; opacity:0.6">${d.reason || (isOut?'Кому: '+d.to : 'От: '+d.from)}</div></div>`;
            });
        });
    }

    // ЛОГИКА ОПЕРАЦИЙ ЗАДАНИЙ (TASKS)
    function createTask() {
        const title = document.getElementById('nt-title').value.trim();
        const desc = document.getElementById('nt-desc').value.trim();
        const points = parseInt(document.getElementById('nt-points').value);
        const assignee = document.getElementById('nt-assignee').value;

        if (!title || !desc || !points) return alert("Заполните все поля задания!");

        const taskData = {
            title: title,
            description: desc,
            points: points,
            assignedTo: assignee,
            createdBy: currentLogin,
            status: 'pending'
        };

        db.ref('tasks').push(taskData).then(() => {
            document.getElementById('nt-title').value = '';
            document.getElementById('nt-desc').value = '';
            document.getElementById('nt-points').value = '';
            document.getElementById('modal-task-create').style.display = 'none';
        });
    }

    function loadTasks(isAdminRole) {
        db.ref('tasks').on('value', snap => {
            const container = document.getElementById('tasks-container');
            if (!container) return;
            container.innerHTML = '';
            
            Object.entries(snap.val() || {}).reverse().forEach(([id, t]) => {
                if (!isAdminRole && t.assignedTo !== currentLogin && t.assignedTo !== 'all') return;

                const item = document.createElement('div');
                item.className = 'task-item';
                
                const isCompleted = t.status === 'completed';
                const badgeClass = isCompleted ? 'completed' : 'pending';
                const badgeText = isCompleted ? 'Выполнено' : 'В процессе';
                const scopeText = t.assignedTo === 'all' ? 'ДЛЯ ВСЕХ' : t.assignedTo.toUpperCase();

                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                        <span style="font-size:11px; color:var(--primary); font-weight:bold;">${scopeText}</span>
                        <span class="task-badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <div style="font-weight:bold; font-size:14px; margin-bottom:4px;">${t.title}</div>
                    <div style="font-size:12px; color:var(--success); font-weight:bold;">+${t.points} Б</div>
                `;
                
                item.onclick = () => openTaskModal(id, t);
                container.appendChild(item);
            });
        });
    }

    function openTaskModal(id, task) {
        activeTaskId = id;
        document.getElementById('vt-title').innerText = task.title;
        document.getElementById('vt-desc').innerText = task.description;
        document.getElementById('vt-meta').innerText = `Баллы: ${task.points} | Кому: ${task.assignedTo.toUpperCase()} | Статус: ${task.status === 'completed' ? 'Выполнено' : 'Активно'}`;
        document.getElementById('modal-task-view').style.display = 'block';

        db.ref(`tasks/${id}/messages`).on('value', snap => {
            const box = document.getElementById('vt-chat-box');
            box.innerHTML = '';
            snap.forEach(m => {
                const msg = m.val();
                const isMyMsg = msg.sender === currentLogin;
                box.innerHTML += `
                    <div class="chat-msg ${isMyMsg ? 'user-style' : 'admin-style'}">
                        <div style="font-size:9px; opacity:0.6; font-weight:bold; margin-bottom:2px;">${msg.sender}</div>
                        <div>${msg.text}</div>
                    </div>
                `;
            });
            box.scrollTop = box.scrollHeight;
        });

        const actions = document.getElementById('vt-actions');
        actions.innerHTML = '';

        if (admins.includes(currentLogin)) {
            actions.innerHTML = `<button style="background:var(--accent); margin:0;" onclick="deleteTask('${id}')">Удалить задание</button>`;
        } else if (task.status !== 'completed') {
            actions.innerHTML = `<button style="background:var(--success); margin:0;" onclick="completeTask('${id}', ${task.points}, '${task.assignedTo}')">Выполнено</button>`;
        }
    }

    function closeTaskModal() {
        document.getElementById('modal-task-view').style.display = 'none';
        if (activeTaskId) {
            db.ref(`tasks/${activeTaskId}/messages`).off();
            activeTaskId = null;
        }
    }

    function sendMessage() {
        const input = document.getElementById('vt-chat-input');
        const text = input.value.trim();
        if (!text || !activeTaskId) return;

        const msg = {
            sender: currentLogin,
            text: text,
            timestamp: Date.now()
        };

        db.ref(`tasks/${activeTaskId}/messages`).push(msg).then(() => {
            input.value = '';
        });
    }

    function completeTask(id, points, assignedTo) {
        if (!confirm("Подтверждаешь выполнение задания?")) return;

        db.ref(`tasks/${id}/status`).set('completed').then(() => {
            if (assignedTo === 'all') {
                db.ref(`users/${currentLogin}/balance`).transaction(c => (c || 0) + points);
                db.ref('history').push({ from: 'Задание (Всем)', to: currentLogin, amount: points, reason: `Выполнено: общая задача`, timestamp: Date.now() });
            } else {
                db.ref(`users/${assignedTo}/balance`).transaction(c => (c || 0) + points);
                db.ref('history').push({ from: 'Задание', to: assignedTo, amount: points, reason: `Выполнено персональное задание`, timestamp: Date.now() });
            }
            alert(`Задание выполнено! Вам начислено +${points} Б`);
            closeTaskModal();
        });
    }

    function deleteTask(id) {
        if (!confirm("Удалить это задание окончательно?")) return;
        closeTaskModal();
        db.ref(`tasks/${id}`).remove();
    }
</script>
