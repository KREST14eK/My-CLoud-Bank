<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Cloud Bank | Premium</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            position: relative;
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 28px; margin-bottom: 25px; letter-spacing: -0.5px; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 15px; color: #94a3b8; }
        
        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; background: rgba(15, 23, 42, 0.8); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        .balance-card {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            padding: 30px;
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .balance-label { font-size: 14px; opacity: 0.8; text-transform: uppercase; }
        .balance-amount { font-size: 42px; font-weight: 800; margin: 5px 0; }

        .admin-panel {
            margin-top: 25px;
            padding: 20px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            display: none;
        }

        .admin-badge {
            background: #ef4444;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            vertical-align: middle;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="screen active">
        <div style="text-align: center;">
            <div style="font-size: 50px; color: var(--primary); margin-bottom: 10px;"><i class="fas fa-university"></i></div>
            <h2>Global Cloud Bank</h2>
        </div>
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="login-input" placeholder="Ваш логин">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="pass-input" placeholder="Пароль">
        </div>
        <button onclick="auth()">Войти в систему</button>
    </div>

    <div id="main-screen" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span><i class="fas fa-circle-user"></i> <span id="user-name"></span><span id="admin-tag" class="admin-badge" style="display:none">ADMIN</span></span>
            <i class="fas fa-right-from-bracket" onclick="location.reload()" style="cursor:pointer; opacity: 0.6;"></i>
        </div>

        <div class="balance-card">
            <div class="balance-label">Доступный баланс</div>
            <div class="balance-amount"><span id="balance-val">0</span> <small style="font-size: 20px;">$</small></div>
        </div>

        <button style="background: #22c55e;" onclick="clickMoney()">
            <i class="fas fa-hand-pointer"></i> ЗАРАБОТАТЬ 1$
        </button>

        <div style="margin-top: 30px;">
            <h4 style="margin-bottom: 15px;"><i class="fas fa-paper-plane"></i> Быстрый перевод</h4>
            <input type="text" id="target-user" placeholder="Логин получателя" style="margin-bottom: 10px; padding-left: 15px;">
            <input type="number" id="amount-input" placeholder="Сумма $" style="padding-left: 15px;">
            <button style="background: #f59e0b;" onclick="sendMoney()">Отправить средства</button>
        </div>

        <div id="admin-panel" class="admin-panel">
            <h4 style="color: #ef4444; margin: 0 0 15px 0;"><i class="fas fa-shield-halved"></i> Панель управления</h4>
            <input type="text" id="edit-target" placeholder="Логин цели" style="margin-bottom: 8px;">
            <input type="number" id="edit-balance" placeholder="Новый баланс" style="margin-bottom: 8px;">
            <input type="text" id="edit-password" placeholder="Новый пароль" style="margin-bottom: 8px;">
            <button style="background: #ef4444;" onclick="adminPower()">Применить изменения</button>
        </div>
    </div>
</div>

<script>
    // ТВОИ КЛЮЧИ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBExRrPLJEI-oWgOEcZ2WLn04EGLduGJSc",
        authDomain: "mycloudlybank.firebaseapp.com",
        databaseURL: "https://mycloudlybank-default-rtdb.firebaseio.com",
        projectId: "mycloudlybank",
        storageBucket: "mycloudlybank.firebasestorage.app",
        messagingSenderId: "482067969296",
        appId: "1:482067969296:web:0bcb8305693cac9dfc2195",
        measurementId: "G-LHBDJLQ3YE"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentLogin = null;

    function auth() {
        const login = document.getElementById('login-input').value.trim();
        const pass = document.getElementById('pass-input').value;

        if (!login || !pass) return alert("Заполни поля!");

        const ref = db.ref('users/' + login);
        ref.once('value', (snap) => {
            if (snap.exists()) {
                if (snap.val().password === pass) {
                    goMain(login, snap.val());
                } else {
                    alert("Ошибка доступа!");
                }
            } else {
                const newUser = { password: pass, balance: 100 };
                ref.set(newUser);
                goMain(login, newUser);
            }
        });
    }

    function goMain(login, data) {
        currentLogin = login;
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('main-screen').classList.add('active');
        document.getElementById('user-name').innerText = login;

        if (login === 'maxA' || login === 'svutppru') {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('admin-tag').style.display = 'inline-block';
        }

        db.ref('users/' + login + '/balance').on('value', (s) => {
            document.getElementById('balance-val').innerText = s.val() || 0;
        });
    }

    function clickMoney() {
        db.ref('users/' + currentLogin + '/balance').transaction(c => (c || 0) + 1);
    }

    function sendMoney() {
        const target = document.getElementById('target-user').value.trim();
        const amount = parseInt(document.getElementById('amount-input').value);
        if (!target || amount <= 0) return;

        const myRef = db.ref('users/' + currentLogin + '/balance');
        const targetRef = db.ref('users/' + target + '/balance');

        myRef.once('value', (s) => {
            if (s.val() < amount) return alert("Недостаточно средств");
            myRef.set(s.val() - amount);
            targetRef.once('value', (ts) => {
                targetRef.set((ts.val() || 0) + amount);
                alert("Успешно!");
            });
        });
    }

    function adminPower() {
        const t = document.getElementById('edit-target').value;
        const b = document.getElementById('edit-balance').value;
        const p = document.getElementById('edit-password').value;
        
        if(t) {
            if(b) db.ref('users/' + t + '/balance').set(parseInt(b));
            if(p) db.ref('users/' + t + '/password').set(p);
            alert("Данные обновлены в базе!");
        }
    }
</script>
</body>
</html>
