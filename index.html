<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Bank Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .bank-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; }
        .balance-card { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .balance-amount { font-size: 32px; font-weight: bold; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1557b0; }
        .admin-panel { margin-top: 20px; padding: 15px; border: 2px dashed #ff5252; border-radius: 10px; display: none; }
        /* Стили для уведомлений (Зарплаты) */
        #news-feed { margin-top: 20px; max-height: 150px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px; }
        .news-item { font-size: 0.85em; background: #e8f0fe; padding: 8px; border-radius: 5px; margin-bottom: 5px; color: #1967d2; border-left: 4px solid #1a73e8; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="bank-container">
    <h2>CLOUD BANK 🏦</h2>

    <div id="auth-section">
        <input type="text" id="login-input" placeholder="Логин">
        <input type="password" id="pass-input" placeholder="Пароль">
        <button onclick="login()">Войти / Создать аккаунт</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="balance-card">
            <div>Ваш баланс:</div>
            <div class="balance-amount"><span id="user-balance">0</span> ₽</div>
            <div id="user-name-display" style="margin-top: 10px; opacity: 0.8;"></div>
        </div>

        <div class="transfer-box">
            <h4>Быстрый перевод</h4>
            <input type="text" id="target-user" placeholder="Кому (логин)">
            <input type="number" id="transfer-amount" placeholder="Сумма ₽">
            <button onclick="sendMoney()">Отправить перевод</button>
        </div>

        <div id="news-feed">
            <h5 style="margin: 0 0 10px 0; color: #555;">Лента транзакций (LIVE)</h5>
            <div id="news-list"></div>
        </div>

        <button onclick="logout()" style="background: #5f6368; margin-top: 20px;">Выйти</button>
    </div>

    <div id="admin-panel" class="admin-panel">
        <h4 style="color: #ff5252; margin-top: 0;">Панель Управления</h4>
        <input type="number" id="admin-bonus" placeholder="Сумма пополнения">
        <button onclick="adminAddMoney()" style="background: #ff5252;">Выдать как Зарплату</button>
    </div>
</div>

<script>
    // ТВОИ НАСТРОЙКИ FIREBASE (Вставь свои данные сюда)
    const firebaseConfig = {
        databaseURL: "https://твой-проект.firebaseio.com" 
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;

    // ВХОД
    function login() {
        const login = document.getElementById('login-input').value;
        const pass = document.getElementById('pass-input').value;

        if(!login || !pass) return alert("Введите данные");

        db.ref('users/' + login).once('value', (snapshot) => {
            const userData = snapshot.val();
            if (userData) {
                if (userData.pass === pass) {
                    startSession(login, userData);
                } else {
                    alert("Неверный пароль");
                }
            } else {
                const newUser = { pass: pass, balance: 100 };
                db.ref('users/' + login).set(newUser);
                startSession(login, newUser);
            }
        });
    }

    function startSession(login, data) {
        currentUser = login;
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
        document.getElementById('user-name-display').innerText = "Аккаунт: " + login;
        
        if (login === "13") {
            document.getElementById('admin-panel').style.display = 'block';
        }

        // Следим за балансом онлайн
        db.ref('users/' + login + '/balance').on('value', (snap) => {
            document.getElementById('user-balance').innerText = snap.val();
        });

        // Следим за новостями (Зарплаты/Переводы)
        db.ref('global_news').limitToLast(5).on('child_added', (snap) => {
            const msg = snap.val();
            const div = document.createElement('div');
            div.className = 'news-item';
            div.innerText = `📢 ${msg.text}`;
            const list = document.getElementById('news-list');
            list.insertBefore(div, list.firstChild);
        });
    }

    // ПЕРЕВОД
    function sendMoney() {
        const target = document.getElementById('target-user').value;
        const amount = parseInt(document.getElementById('transfer-amount').value);

        if (!target || amount <= 0) return alert("Ошибка данных");

        db.ref('users/' + currentUser + '/balance').once('value', (snap) => {
            let myBalance = snap.val();
            if (myBalance < amount) return alert("Недостаточно средств");

            db.ref('users/' + target).once('value', (targetSnap) => {
                if (!targetSnap.exists()) return alert("Пользователь не найден");

                // Снимаем у меня
                db.ref('users/' + currentUser + '/balance').set(myBalance - amount);
                // Добавляем ему
                db.ref('users/' + target + '/balance').set(targetSnap.val().balance + amount);
                
                // Рассылаем уведомление всем
                db.ref('global_news').push({
                    text: `${currentUser} перевел ${target} сумму ${amount} ₽`
                });

                alert("Перевод выполнен!");
            });
        });
    }

    // АДМИН-ФУНКЦИЯ (ВЫДАЧА ЗАРПЛАТЫ)
    function adminAddMoney() {
        const amount = parseInt(document.getElementById('admin-bonus').value);
        db.ref('users/' + currentUser + '/balance').once('value', (snap) => {
            db.ref('users/' + currentUser + '/balance').set(snap.val() + amount);
            
            // Уведомление о "Зарплате" для всех
            db.ref('global_news').push({
                text: `Центробанк выдал зарплату пользователю ${currentUser}: ${amount} ₽`
            });
        });
    }

    function logout() { location.reload(); }
</script>

</body>
</html>
